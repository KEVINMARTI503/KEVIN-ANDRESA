<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <div class="form-container">
    <h2>Registro</h2>
    <p class="descripcion">Crea tu cuenta para acceder al sistema</p>

    <label for="email">Correo Electrónico</label>
    <input type="email" id="email" placeholder="ingrese correo..">

    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="********">

    //Este es el botón encargado de registrar a un nuevo usuario
    <button onclick="registrar()">REGISTRARSE</button>

    <p class="registro">¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a></p>
  </div>

  <script>
    //Aquí es donde se registra al nuevo usuario en el sistema tomando el correo y la contraseña ingresados valiando ambos campos
    //tengan información y los almacena en el localStorage
    function registrar() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (email && password) {
        localStorage.setItem("usuario", JSON.stringify({ email, password }));
        alert("Registro exitoso");
        window.location.href = "login.html";
      } else {
        alert("Completa todos los campos.");
      }
    }
  </script>
</body>
</html>
