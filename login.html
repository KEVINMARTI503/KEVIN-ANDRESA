<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <div class="form-container">
    <h2>Iniciar Sesión</h2>
    <p class="descripcion">Ingresa tus credenciales para acceder al sistema</p>

    <label for="email">Correo Electrónico</label>
    <input type="email" id="email" placeholder="ingrese correo..">

    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="********">

    <div class="recuperar">
      <a href="#">¿Olvidaste tu contraseña?</a>
    </div>

    //Este es el botón que ejecuta la orden de inicio de sesión
    <button onclick="login()">INGRESAR</button>

    <p class="registro">¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a></p>
  </div>

  <script>

    //Aquí se validan las credenciales ingresadas por el usuario, comparando el correo y la contraseña ingresados en el almacenamiento
    //Si son correctos, generará un código de verificación de dos pasos y lo redirige a la verificación, en este caso de prueba.
    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const stored = JSON.parse(localStorage.getItem("usuario"));

      //Verifica si el usuario  existe y las credenciales coinciden
      if (stored && stored.email === email && stored.password === password) {
        const codigo = Math.floor(100000 + Math.random() * 900000);
        
        //Guarda el código de verificación en el localstorage
        localStorage.setItem("codigo_verificacion", codigo);
        alert("Código de verificación enviado (simulado): " + codigo);
        window.location.href = "verificacion.html";
      } else {
        alert("Correo o contraseña incorrectos.");
      }
    }
  </script>
</body>
</html>
